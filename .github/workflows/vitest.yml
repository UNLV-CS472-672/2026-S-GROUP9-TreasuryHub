name: Vitest Tests

#When is this test ran?
on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]
#What does it do?
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - name: Install dependencies
              run: npm ci
            
            - name: Run Vitest
              run: npm run test

